<!DOCTYPE html>
<html>
<body>
    <h2>AI Security Port Scanner</h2>
    <form method="POST">
        <input type="text" name="target" placeholder="Enter IP (e.g. 127.0.0.1)">
        <button type="submit">Scan Ports</button>
    </form>
    {% if result %}
        <h3>Results:</h3>
        <ul>
            {% for port, details in result.items() %}
                <li>Port {{ port }}: {{ details.state }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
